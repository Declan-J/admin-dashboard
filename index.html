<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <!-- LINKS -->
    <link href="./styles.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <div class="sidebar-wrapper">
        <div class="sidebar-header sidebar-row">
          <span class="material-symbols-outlined dashboard-icon">
            dashboard
          </span>
          <p>Dashboard</p>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> Home </span>
            <p>Home</p>
          </div>
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> id_card </span>
            <p>Profile</p>
          </div>
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> Message </span>
            <p>Messages</p>
          </div>
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> History </span>
            <p>History</p>
          </div>
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> Task </span>
            <p>Tasks</p>
          </div>
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> Groups </span>
            <p>Communities</p>
          </div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> Settings </span>
            <p>Settings</p>
          </div>
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> Contact_Support </span>
            <p>Support</p>
          </div>
          <div class="sidebar-row">
            <span class="material-symbols-outlined"> Verified_user </span>
            <p>Privacy</p>
          </div>
        </div>
      </div>
    </nav>
    <header>
      <div class="search">
        <label for="search"
          ><span class="material-symbols-outlined"> Search </span></label
        >
        <input type="search" id="search" name="q" />
      </div>
      <div class="profile-pane">
        <span class="material-symbols-outlined"> Notifications </span>
        <span class="material-symbols-outlined"> Account_Circle </span>
        <p>Declan Jacobs</p>
      </div>
      <div class="greeting-pane">
        <span class="material-symbols-outlined"> Account_Circle </span>
        <div class="greeting">
          <p>Hi there,</p>
          <p class="username">Declan Jacobs (@declan)</p>
        </div>
      </div>
      <div class="buttons-panel">
        <button type="button">New</button>
        <button type="button">Upload</button>
        <button type="button">Share</button>
      </div>
    </header>
    <main>MAIN</main>
  </body>
</html>
